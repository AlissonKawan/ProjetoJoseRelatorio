<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: white;
      padding: 15px;
      margin: 0;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 180px;
      border-radius: 12px;
      border: none;
      padding: 15px;
      font-size: 16px;
      background: #1e1e1e;
      color: white;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
    }

    .card {
      margin-top: 20px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      display: none;
    }

    .linha {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
      font-size: 20px;
    }

    .label {
      color: #aaa;
    }

    .valor {
      font-weight: bold;
    }

    .erro {
      color: red;
      text-align: center;
      margin-top: 10px;
      font-size: 16px;
    }

    /* 📱 telas maiores */
    @media (min-width: 600px) {
      body {
        max-width: 500px;
        margin: auto;
      }
    }
  </style>
</head>

<body>

<h1>📊 Relatórios</h1>

<textarea id="texto" placeholder="Cole aqui o relatório..."></textarea>

<button onclick="enviar()">Calcular</button>

<div class="card" id="resultado">
  <div class="linha">
    <span class="label">KM Total</span>
    <span class="valor" id="km"></span>
  </div>
  <div class="linha">
    <span class="label">Horas extras</span>
    <span class="valor" id="minutos"></span>
  </div>
  <div class="linha">
    <span class="label">Valor</span>
    <span class="valor">R$ <span id="valor"></span></span>
  </div>
</div>

<p class="erro" id="erro"></p>

<script>
  async function enviar() {
    const texto = document.getElementById("texto").value;

    if (!texto.trim()) {
      document.getElementById("erro").innerText = "Cole um relatório primeiro!";
      return;
    }

    document.getElementById("erro").innerText = "";

    try {
      const response = await fetch("/relatorios", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify([texto])
      });

      const data = await response.text();

      const partes = data.split("|");

      const km = partes[0].replace("KM:", "").trim();
      const minutosNumero = parseInt(partes[1].replace("Minutos:", "").trim());

      const horas = Math.floor(minutosNumero / 60);
      const resto = minutosNumero % 60;

      const minutosFormatado = `${horas}h ${resto}min`;
      const valor = partes[2].replace("Valor:", "").trim();

      document.getElementById("km").innerText = km;
      document.getElementById("minutos").innerText = minutosFormatado;
      document.getElementById("valor").innerText = valor;

      document.getElementById("resultado").style.display = "block";

    } catch (error) {
      document.getElementById("erro").innerText = "Erro ao processar.";
    }
  }
</script>

</body>
</html>
